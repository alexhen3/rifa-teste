<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <script src="../js/admin-auth.js"></script>
  <script>AdminAuth.requireLogin("login.html");</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Participantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin_dashboard/participants.css">
  <script src="../js/store.js"></script>
</head>

<body>
  <div class="container">
    <h1>Participantes da Rifa</h1>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Rifa</th>
          <th>Status</th>
          <th>Data</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="participants-table-body">
        <!-- Preenchido dinamicamente a partir das reservas salvas -->
      </tbody>
    </table>
    <p id="no-participants-message" style="display:none;">Nenhum participante ainda. As reservas feitas na página da rifa vão aparecer aqui.</p>
  </div>

  <!-- Modal -->
  <div class="modal" id="participantModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">×</button>
      <h2 id="modalName">Participante</h2>
      <p><strong>Email:</strong> <span id="modalEmail"></span></p>
      <p><strong>Rifa:</strong> <span id="modalRaffle"></span></p>
      <p><strong>Números:</strong></p>
      <div class="numbers" id="modalNumbers"></div>
    </div>
  </div>

  <script>
    function openModal(name, email, raffle, numbers) {
      document.getElementById('modalName').textContent = name;
      document.getElementById('modalEmail').textContent = email;
      document.getElementById('modalRaffle').textContent = raffle;

      const numberContainer = document.getElementById('modalNumbers');
      numberContainer.innerHTML = '';
      numbers.forEach(num => {
        const span = document.createElement('span');
        span.className = 'number';
        span.textContent = num;
        numberContainer.appendChild(span);
      });

      document.getElementById('participantModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('participantModal').style.display = 'none';
    }

    // Preenche a tabela com as reservas reais feitas no site
    var orders = Store.getOrders();
    var tbody = document.getElementById('participants-table-body');

    if (orders.length === 0) {
      document.getElementById('no-participants-message').style.display = 'block';
    } else {
      orders.forEach(function (order) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td data-label="Nome">' + order.fullName + '</td>' +
          '<td data-label="Email">' + order.email + '</td>' +
          '<td data-label="Rifa">' + order.raffleTitle + '</td>' +
          '<td data-label="Status"><span class="status pending">Aguardando pagamento</span></td>' +
          '<td data-label="Data">' + Store.formatDate(order.createdAt) + '</td>' +
          '<td data-label="Ação"><button class="view-btn">Ver números</button></td>';

        tr.querySelector('.view-btn').addEventListener('click', function () {
          openModal(order.fullName, order.email, order.raffleTitle, order.ticketNumbers);
        });

        tbody.appendChild(tr);
      });
    }
  </script>
</body>

</html>
