<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAV AWARDS | Review</title>
    <link rel="stylesheet" href="./css/review.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>

<body>
    
    <!-- Header -->
    <header>
        <div class="logo">
            <a href="#">
                <img src="./images/logo.svg" alt="Logo" draggable="false">
            </a>
        </div>
    </header>
    <!-- Header -->

    <!-- Content -->
    <main>
        <div class="main-container">
            <div class="checkout-list" id="checkout-list">
                <div class="information-list">
                    <div class="info">
                        <span>Nome:</span>
                        <b id="review-name"></b>
                    </div>
                    <div class="info">
                        <span>Email:</span>
                        <b id="review-email"></b>
                    </div>
                    <div class="info">
                        <span>Telefone/WhatsApp:</span>
                        <b id="review-phone"></b>
                    </div>
                    <div class="info">
                        <span>Quantidade de bilhetes:</span>
                        <b id="review-quantity"></b>
                    </div>
                    <div id="see-tickets" class="see-tickets">
                        <span>ver bilhetes</span>
                    </div>
                    <div id="ticket-numbers" class="ticket-numbers">
                        <!-- Preenchido dinamicamente -->
                    </div>
                </div>
            </div>
            <p id="no-order-message" style="display:none;">Nenhuma reserva encontrada. <a href="./index.html">Voltar para a página inicial</a>.</p>
            <a href="./transaction_pix.html" class="purchase" id="pay-pix-link">
                <span>Pagar com o PIX</span>
            </a>
        </div>
    </main>
    <!-- Content -->

    <script src="./js/store.js"></script>
    <script>
        var order = Store.getLastOrder();

        if (!order) {
            document.getElementById('checkout-list').style.display = 'none';
            document.getElementById('pay-pix-link').style.display = 'none';
            document.getElementById('no-order-message').style.display = 'block';
        } else {
            document.getElementById('review-name').textContent = order.fullName;
            document.getElementById('review-email').textContent = order.email;
            document.getElementById('review-phone').textContent = order.phone;
            document.getElementById('review-quantity').textContent = order.quantity;

            var ticketNumbersContainer = document.getElementById('ticket-numbers');
            order.ticketNumbers.forEach(function (number) {
                var p = document.createElement('p');
                p.textContent = number;
                ticketNumbersContainer.appendChild(p);
            });
        }
    </script>
    <script src="./js/see-tickets.js"></script>
</body>
</html>
